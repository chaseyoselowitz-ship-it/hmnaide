<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chase Yoselowitz</title>
  <style>
    :root { --ink: #14110f; --paper: #f6f3ee; --accent: #c2461d; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--paper); color: var(--ink);
      min-height: 100vh; display: grid; place-items: center; padding: 2rem;
      line-height: 1.5;
    }
    main { max-width: 40rem; text-align: center; }
    .kicker { text-transform: uppercase; letter-spacing: 0.18em; font-size: 0.8rem; color: var(--accent); font-weight: 700; }
    h1 { font-size: clamp(2.2rem, 6vw, 3.6rem); margin: 0.6rem 0 1rem; letter-spacing: -0.02em; }
    p { font-size: 1.15rem; color: #4a433d; }
    .cta { display: inline-block; margin-top: 2rem; padding: 0.8rem 1.6rem; background: var(--ink); color: var(--paper); text-decoration: none; border-radius: 999px; font-weight: 600; }
    footer { margin-top: 3rem; font-size: 0.85rem; color: #8a827b; }
  </style>
</head>
<body>
  <main>
    <p class="kicker">Coming Soon</p>
    <h1>This is your website.</h1>
    <p>It's live on the internet, and you can change anything on it just by asking Claude. Tell Claude what you want here — your story, your services, a way to get in touch — and it will update this page.</p>
    <a class="cta" href="mailto:chaseyoselowitz@gmail.com">Get in touch</a>
    <footer>Built with Claude Code · Deployed on Vercel</footer>
  </main>
</body>
</html>
